<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명찰 자동 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  font-family: 'Inter', 'Noto Sans KR', sans-serif;
}
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #9FD8F5 0%, #ADDEC8 50%, #BFF0A0 100%);
  background-attachment: fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

/* ── 메인 앱 카드 ── */
.app-card {
  width: 100%;
  max-width: 1000px;
  background: rgba(255, 255, 255, 0.78);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 28px;
  border: 1px solid rgba(255, 255, 255, 0.72);
  box-shadow:
    0 4px 40px rgba(70, 150, 190, 0.13),
    0 1px 6px rgba(70, 150, 190, 0.07),
    inset 0 1px 0 rgba(255, 255, 255, 0.88);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 680px;
}

/* ── 상단 헤더 ── */
.app-header {
  background: linear-gradient(135deg, #0C4A6E 0%, #0E7490 50%, #0891B2 100%);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-logo { display: flex; align-items: center; gap: 12px; }
.header-logo-icon {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: white;
}
.header-logo-text { font-size: 20px; font-weight: 800; color: white; letter-spacing: -0.3px; }
.header-subtitle { font-size: 13px; color: rgba(255,255,255,0.7); }

/* ── 바디: 사이드바 + 콘텐츠 ── */
.app-body { display: flex; flex: 1; }

/* ── 사이드바 ── */
.sidebar {
  width: 72px;
  background: rgba(246, 250, 253, 0.68);
  border-right: 1px solid rgba(207, 250, 254, 0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 0;
  gap: 8px;
  flex-shrink: 0;
}
.sidebar-btn {
  width: 48px; height: 48px;
  border-radius: 14px;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: #9CA3AF;
  transition: all 0.15s;
}
.sidebar-btn:hover { background: #CFFAFE; color: #0891B2; }
.sidebar-btn.active {
  background: linear-gradient(135deg, #0891B2, #38BDF8);
  color: white;
  box-shadow: 0 4px 12px rgba(8,145,178,0.3);
}
.sidebar-btn span { font-size: 9px; font-weight: 600; }

/* ── 콘텐츠 영역 ── */
.content { flex: 1; padding: 32px; overflow-y: auto; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── 섹션 타이틀 ── */
.section-title {
  font-size: 11px; font-weight: 700; color: #9CA3AF;
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
}

/* ── 2열 그리드 ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

/* ── 업로드 드래그존 ── */
.upload-zone {
  background: rgba(248, 252, 255, 0.72);
  border: 2px dashed rgba(186, 230, 253, 0.85);
  border-radius: 16px;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  box-shadow: 0 2px 12px rgba(70, 150, 190, 0.06);
}
.upload-zone:hover { border-color: rgba(8, 145, 178, 0.65); background: rgba(236, 254, 255, 0.80); }
.upload-zone.dragover { border-color: rgba(8, 145, 178, 0.7); background: rgba(224, 247, 250, 0.82); }
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}
.upload-zone .zone-icon { color: #7DD3FC; margin-bottom: 10px; display: flex; justify-content: center; }
.upload-zone .zone-title { font-size: 13px; font-weight: 600; color: #0891B2; margin-bottom: 4px; }
.upload-zone .zone-sub { font-size: 11px; color: #9CA3AF; }
.upload-zone.success { border-color: rgba(34, 197, 94, 0.65); background: rgba(240, 253, 244, 0.80); }
.upload-zone.success .zone-icon { color: #22C55E; }
.upload-zone.success .zone-title { color: #16A34A; }

/* ── 미리보기 테이블 ── */
.preview-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
  margin-top: 12px; border-radius: 10px; overflow: hidden;
  border: 1px solid rgba(207, 250, 254, 0.8);
}
.preview-table th { background: rgba(236, 254, 255, 0.78); color: #0891B2; font-weight: 700; padding: 8px 12px; text-align: left; }
.preview-table td { padding: 7px 12px; color: #374151; border-top: 1px solid rgba(239, 246, 255, 0.9); }
.preview-table tr:hover td { background: rgba(250, 251, 252, 0.75); }

/* ── 입력 필드 ── */
.input-group { margin-bottom: 16px; }
.input-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px;
}
.input-label svg { color: #0891B2; }
.text-input {
  width: 100%; padding: 10px 14px;
  background: rgba(255, 255, 255, 0.78);
  border: 1.5px solid rgba(209, 213, 219, 0.85); border-radius: 10px;
  font-size: 14px; color: #1A1A2E; outline: none; transition: border-color 0.15s, background 0.15s;
}
.text-input:focus { border-color: #0891B2; background: rgba(255, 255, 255, 0.92); }

/* ── 토글 버튼 그룹 ── */
.toggle-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.toggle-group > label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: #374151;
  margin-bottom: 8px; width: 100%;
}
.toggle-btn {
  padding: 8px 16px; border-radius: 10px;
  border: 1.5px solid rgba(229, 231, 235, 0.9);
  background: rgba(252, 253, 254, 0.75);
  font-size: 13px; font-weight: 500; color: #6B7280;
  cursor: pointer; transition: all 0.15s;
}
.toggle-btn:hover { border-color: #7DD3FC; color: #0891B2; background: rgba(240, 253, 255, 0.85); }
.toggle-btn.active {
  background: linear-gradient(135deg, #0891B2, #38BDF8);
  border-color: transparent; color: white;
  box-shadow: 0 3px 10px rgba(8,145,178,0.3);
}

/* ── 색상 스와치 ── */
.swatch-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.swatch-row > label { font-size: 13px; font-weight: 600; color: #374151; min-width: 36px; }
.swatch {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.8);
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  cursor: pointer; transition: transform 0.12s; position: relative;
}
.swatch:hover { transform: scale(1.15); }
.swatch.active::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%; border: 2.5px solid #0891B2;
}
.swatch-name { font-size: 12px; color: #6B7280; font-weight: 500; }

/* ── 색상 select (목걸이형) ── */
.color-select {
  padding: 8px 14px;
  border: 1.5px solid rgba(229, 231, 235, 0.85);
  background: rgba(255, 255, 255, 0.78);
  border-radius: 10px; font-size: 13px; color: #374151;
  outline: none; cursor: pointer;
}
.color-select:focus { border-color: #0891B2; }

/* ── 디자인 카드 ── */
.design-cards { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
.design-card {
  width: 170px;
  border: 1.5px solid rgba(229, 231, 235, 0.8);
  border-radius: 16px; padding: 14px;
  cursor: pointer; transition: all 0.15s;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 2px 12px rgba(70, 150, 190, 0.07),
              inset 0 1px 0 rgba(255, 255, 255, 0.9);
}
.design-card:hover {
  border-color: rgba(56, 189, 248, 0.65);
  box-shadow: 0 6px 24px rgba(56, 189, 248, 0.12),
              inset 0 1px 0 rgba(255, 255, 255, 0.9);
  background: rgba(255, 255, 255, 0.90);
}
.design-card.active {
  border-color: #0891B2;
  background: rgba(236, 254, 255, 0.88);
  box-shadow: 0 6px 24px rgba(8, 145, 178, 0.15),
              inset 0 1px 0 rgba(255, 255, 255, 0.9);
}
.design-preview {
  width: 100%; height: 68px; border-radius: 10px;
  margin-bottom: 10px; display: flex; align-items: center; justify-content: center;
}
.design-card-id {
  width: 20px; height: 20px; border-radius: 50%;
  background: #F3F4F6; color: #6B7280;
  font-size: 11px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center; margin-right: 6px;
}
.design-card.active .design-card-id {
  background: linear-gradient(135deg, #0891B2, #38BDF8); color: white;
}
.design-card-name { font-size: 13px; font-weight: 700; color: #1A1A2E; display: inline; }
.design-card.active .design-card-name { color: #0891B2; }
.design-card-desc { font-size: 11px; color: #6B7280; margin-top: 5px; line-height: 1.4; }

/* ── 구분선 ── */
.divider { height: 1px; background: #F3F4F6; margin: 20px 0; }

/* ── 행사모드 토글 스위치 ── */
.switch-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.switch { position: relative; width: 40px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0;
  background: #D1D5DB; border-radius: 22px; cursor: pointer; transition: 0.2s;
}
.slider:before {
  content: ''; position: absolute;
  width: 16px; height: 16px; left: 3px; top: 3px;
  background: white; border-radius: 50%; transition: 0.2s;
}
input:checked + .slider { background: #0891B2; }
input:checked + .slider:before { transform: translateX(18px); }
.switch-label { font-size: 13px; font-weight: 500; color: #374151; }

/* ── 설정 요약 카드 ── */
.summary-card {
  background: rgba(239, 246, 255, 0.72);
  border: 1px solid rgba(186, 230, 253, 0.55);
  border-radius: 14px; padding: 20px 24px; margin-bottom: 24px;
  box-shadow: 0 2px 12px rgba(70, 150, 190, 0.07),
              inset 0 1px 0 rgba(255, 255, 255, 0.8);
}
.summary-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.summary-row:last-child { margin-bottom: 0; }
.summary-label {
  font-size: 13px; color: #6B7280; width: 80px; flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
}
.summary-value { font-size: 13px; font-weight: 700; color: #1A1A2E; }

/* ── 생성 버튼 ── */
.generate-btn {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #0891B2 0%, #38BDF8 50%, #7DD3FC 100%);
  color: white; border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 8px 24px rgba(8,145,178,0.3); transition: all 0.2s;
}
.generate-btn:hover { box-shadow: 0 12px 32px rgba(8,145,178,0.45); transform: translateY(-1px); }
.generate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ── 다운로드 카드 ── */
.download-card {
  background: rgba(236, 254, 255, 0.72);
  border: 1px solid rgba(186, 230, 253, 0.7);
  border-radius: 16px;
  padding: 24px; margin-top: 20px; display: none;
  box-shadow: 0 4px 24px rgba(70, 150, 190, 0.10),
              inset 0 1px 0 rgba(255, 255, 255, 0.85);
}
.download-card.show { display: block; }
.download-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 700; color: #0E7490; margin-bottom: 16px;
}
.download-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #0891B2, #38BDF8);
  color: white; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s;
}
.download-btn:hover { box-shadow: 0 6px 20px rgba(8,145,178,0.3); }

/* ── 다음 단계 버튼 ── */
.next-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #0891B2, #38BDF8);
  color: white; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  margin-top: 24px; margin-left: auto; transition: all 0.15s;
}
.next-btn:hover { box-shadow: 0 4px 14px rgba(8,145,178,0.35); }

/* ── 로딩 스피너 ── */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.7s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 토스트 알림 ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 12px 20px; border-radius: 12px;
  font-size: 13px; font-weight: 600; color: white;
  opacity: 0; transform: translateY(10px); transition: all 0.3s;
  z-index: 9999; display: flex; align-items: center; gap: 8px; max-width: 320px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #16A34A; }
.toast.error   { background: #DC2626; }
.toast.warning { background: #D97706; }

/* ── 로고 미리보기 ── */
.logo-preview {
  display: flex; align-items: center; gap: 10px;
  margin-top: 10px; padding: 8px 12px;
  background: rgba(236, 254, 255, 0.75);
  border: 1px solid rgba(186, 230, 253, 0.6);
  border-radius: 10px;
}
.logo-preview img { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; }
.logo-preview-name { font-size: 12px; color: #0891B2; font-weight: 500; flex: 1; }
.logo-remove-btn { background: none; border: none; color: #EF4444; cursor: pointer; display: flex; align-items: center; }

@media (max-width: 640px) {
  .grid-2 { grid-template-columns: 1fr; }
  .design-cards { justify-content: center; }
  .app-header { padding: 16px 20px; }
  .content { padding: 20px; }
  .header-subtitle { display: none; }
}
</style>
</head>
<body>
<div class="app-card">

  <!-- 헤더 -->
  <header class="app-header">
    <div class="header-logo">
      <div class="header-logo-icon">
        <i data-lucide="hammer" style="width:22px;height:22px"></i>
      </div>
      <div class="header-logo-text">명찰 자동 생성기</div>
    </div>
    <div class="header-subtitle">엑셀 명단 → 명찰 PPT 자동 생성</div>
  </header>

  <!-- 바디 -->
  <div class="app-body">

    <!-- 사이드바 -->
    <nav class="sidebar">
      <button class="sidebar-btn active" onclick="switchTab('upload')" id="btn-upload" title="파일 업로드">
        <i data-lucide="upload-cloud" style="width:22px;height:22px"></i>
        <span>업로드</span>
      </button>
      <button class="sidebar-btn" onclick="switchTab('design')" id="btn-design" title="디자인 설정">
        <i data-lucide="palette" style="width:22px;height:22px"></i>
        <span>디자인</span>
      </button>
      <button class="sidebar-btn" onclick="switchTab('generate')" id="btn-generate" title="생성 & 다운로드">
        <i data-lucide="wand-2" style="width:22px;height:22px"></i>
        <span>생성</span>
      </button>
    </nav>

    <!-- 콘텐츠 -->
    <main class="content">

      <!-- TAB 1: 파일 업로드 -->
      <div class="tab-panel active" id="tab-upload">
        <div class="grid-2">

          <!-- 엑셀 업로드 -->
          <div>
            <div class="input-label">
              <i data-lucide="file-spreadsheet" style="width:16px;height:16px"></i>
              엑셀 파일 (.xlsx)
            </div>
            <div class="upload-zone" id="excel-zone">
              <input type="file" accept=".xlsx" id="excel-input" onchange="handleExcelUpload(this)">
              <div class="zone-icon"><i data-lucide="upload-cloud" style="width:40px;height:40px"></i></div>
              <div class="zone-title">클릭하거나 파일을 드래그하세요</div>
              <div class="zone-sub">.xlsx</div>
            </div>
            <div id="excel-preview"></div>
          </div>

          <!-- 로고 업로드 -->
          <div>
            <div class="input-label">
              <i data-lucide="image" style="width:16px;height:16px"></i>
              로고 이미지 (.png .jpg)
            </div>
            <div class="upload-zone" id="logo-zone">
              <input type="file" accept=".png,.jpg,.jpeg" id="logo-input" onchange="handleLogoUpload(this)">
              <div class="zone-icon"><i data-lucide="image" style="width:40px;height:40px"></i></div>
              <div class="zone-title">클릭하거나 파일을 드래그하세요</div>
              <div class="zone-sub">.png .jpg</div>
            </div>
            <div id="logo-preview"></div>

            <div class="divider"></div>

            <div class="input-group">
              <div class="input-label">
                <i data-lucide="building-2" style="width:16px;height:16px"></i>
                회사명 직접 입력 (로고 없을 때)
              </div>
              <input type="text" class="text-input" id="company-name"
                placeholder="회사명을 입력하세요"
                oninput="state.companyName = this.value">
            </div>
          </div>

        </div>

        <button class="next-btn" onclick="switchTab('design')">
          다음 단계
          <i data-lucide="arrow-right" style="width:16px;height:16px"></i>
        </button>
      </div>

      <!-- TAB 2: 디자인 설정 -->
      <div class="tab-panel" id="tab-design">

        <div class="section-title">명찰 종류</div>
        <div class="toggle-group" style="margin-bottom:20px">
          <button class="toggle-btn active" onclick="setBadgeType('badge')" id="type-badge">🏷️ 가슴 부착형 (뱃지)</button>
          <button class="toggle-btn" onclick="setBadgeType('lanyard')" id="type-lanyard">🪪 목걸이형 (랜야드)</button>
        </div>

        <!-- 뱃지형 설정 -->
        <div id="badge-settings">
          <div class="section-title">세부 설정</div>

          <div class="toggle-group">
            <label><i data-lucide="ruler" style="width:14px;height:14px"></i> 규격</label>
            <button class="toggle-btn active" onclick="setOpt('badgeSize', '소형 70×25mm', this)">소형 70×25mm</button>
            <button class="toggle-btn" onclick="setOpt('badgeSize', '중형 80×25mm', this)">중형 80×25mm</button>
          </div>

          <div class="toggle-group">
            <label><i data-lucide="layout-grid" style="width:14px;height:14px"></i> 배치</label>
            <button class="toggle-btn active" onclick="setOpt('badgeLayout', 'A4에 8개', this)">A4에 8개</button>
            <button class="toggle-btn" onclick="setOpt('badgeLayout', 'A4에 10개', this)">A4에 10개</button>
            <button class="toggle-btn" onclick="setOpt('badgeLayout', 'A4에 12개', this)">A4에 12개</button>
          </div>

          <div class="swatch-row">
            <label><i data-lucide="droplets" style="width:14px;height:14px"></i> 색상</label>
            <div class="swatch active" style="background:#C9A84C" onclick="setColor('Gold', this)" title="Gold"></div>
            <div class="swatch" style="background:#D4A0A7" onclick="setColor('RoseGold', this)" title="RoseGold"></div>
            <div class="swatch" style="background:#A8A9AD" onclick="setColor('Silver', this)" title="Silver"></div>
            <div class="swatch" style="background:#1A1A1A" onclick="setColor('Black', this)" title="Black"></div>
            <span class="swatch-name" id="color-name">Gold</span>
          </div>
        </div>

        <!-- 목걸이형 설정 -->
        <div id="lanyard-settings" style="display:none">
          <div class="section-title">세부 설정</div>

          <div class="toggle-group">
            <label><i data-lucide="ruler" style="width:14px;height:14px"></i> 규격</label>
            <button class="toggle-btn active" onclick="setLanyardSize('일반 90×120mm', this)">일반 90×120mm</button>
            <button class="toggle-btn" onclick="setLanyardSize('대형 103×133mm', this)">대형 103×133mm</button>
          </div>

          <div class="toggle-group" id="lanyard-layout-group">
            <label><i data-lucide="layout-grid" style="width:14px;height:14px"></i> 배치</label>
            <button class="toggle-btn active" onclick="setOpt('lanyardLayout', 'A4에 2개', this)">A4에 2개</button>
            <button class="toggle-btn" onclick="setOpt('lanyardLayout', 'A4에 4개', this)">A4에 4개</button>
          </div>

          <div class="switch-row">
            <label class="switch">
              <input type="checkbox" id="event-mode-toggle" onchange="toggleEventMode(this.checked)">
              <span class="slider"></span>
            </label>
            <span class="switch-label">행사 모드</span>
          </div>

          <div id="event-fields" style="display:none">
            <div class="grid-2" style="margin-top:8px">
              <input type="text" class="text-input" placeholder="행사명" oninput="state.eventName = this.value">
              <input type="text" class="text-input" placeholder="날짜 (예: 2026-03-18)" oninput="state.eventDate = this.value">
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section-title">디자인 선택</div>
        <div class="design-cards" id="design-cards"></div>

        <div id="lanyard-color-section" style="display:none; margin-top:20px">
          <div class="input-label">
            <i data-lucide="droplets" style="width:14px;height:14px"></i> 색상
          </div>
          <select class="color-select" id="lanyard-color-select"></select>
        </div>

        <button class="next-btn" onclick="switchTab('generate')">
          다음 단계
          <i data-lucide="arrow-right" style="width:16px;height:16px"></i>
        </button>
      </div>

      <!-- TAB 3: 생성 & 다운로드 -->
      <div class="tab-panel" id="tab-generate">

        <div class="summary-card">
          <div class="section-title">현재 설정 요약</div>
          <div class="summary-row">
            <div class="summary-label"><i data-lucide="users" style="width:14px;height:14px"></i> 인원</div>
            <div class="summary-value" id="summary-count">미업로드</div>
          </div>
          <div class="summary-row">
            <div class="summary-label"><i data-lucide="palette" style="width:14px;height:14px"></i> 디자인</div>
            <div class="summary-value" id="summary-design">미선택</div>
          </div>
          <div class="summary-row">
            <div class="summary-label"><i data-lucide="droplets" style="width:14px;height:14px"></i> 색상</div>
            <div class="summary-value" id="summary-color">-</div>
          </div>
        </div>

        <button class="generate-btn" id="generate-btn" onclick="generate()">
          <i data-lucide="wand-2" style="width:20px;height:20px"></i>
          <span id="generate-btn-text">명찰 생성하기</span>
          <div class="spinner" id="generate-spinner"></div>
        </button>

        <div class="download-card" id="download-card">
          <div class="download-title">
            <i data-lucide="check-circle-2" style="width:24px;height:24px;color:#0891B2"></i>
            <span id="download-title-text">명찰 생성 완료!</span>
          </div>
          <button class="download-btn" onclick="download()">
            <i data-lucide="download" style="width:18px;height:18px"></i>
            PPT 다운로드
          </button>
        </div>

      </div>

    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 상태 ──────────────────────────────────────────────────────────────────
const state = {
  excelPath:    null,
  logoPath:     null,
  companyName:  '',
  badgeType:    'badge',
  design:       null,
  color:        'Gold',
  badgeSize:    '소형 70×25mm',
  badgeLayout:  'A4에 8개',
  lanyardSize:  '일반 90×120mm',
  lanyardLayout: 'A4에 2개',
  eventMode:    false,
  eventName:    '',
  eventDate:    '',
  pptxFilename: null,
  peopleCount:  0,
};

const BADGE_DESIGNS = {
  A: { name:'Classic',    desc:'로고 좌측 원형 + 이름/직급 우측', bg:'linear-gradient(135deg,#E0F7FA,#DDD6FE)', icon:'🏷️' },
  B: { name:'Centered',   desc:'모든 텍스트 중앙 + 구분선',       bg:'linear-gradient(135deg,#FCE7F3,#FBCFE8)', icon:'🏷️' },
  C: { name:'Modern',     desc:'미니멀, 여백 넉넉',               bg:'linear-gradient(135deg,#E0F2FE,#BAE6FD)', icon:'🏷️' },
};
const LANYARD_DESIGNS = {
  D: { name:'Wave',       desc:'흰 배경 + 하단 웨이브',           bg:'linear-gradient(180deg,#fff 60%,#FF6B6B 60%)', icon:'🪪' },
  E: { name:'Gradient',   desc:'그라데이션 배경 + 흰 텍스트',     bg:'linear-gradient(135deg,#7C3AED,#EC4899)',      icon:'🪪' },
  F: { name:'Bold Solid', desc:'단색 밝은 배경 + 굵은 이름',      bg:'linear-gradient(135deg,#FEF3C7,#FDE68A)',      icon:'🪪' },
};
// spec.json 에서 주입 (Jinja2)
const LANYARD_COLORS = {
  D: {{ spec.lanyard.D.wave_colors.keys() | list | tojson }},
  E: {{ spec.lanyard.E.gradients.keys()   | list | tojson }},
  F: {{ spec.lanyard.F.bg_colors.keys()   | list | tojson }},
};

// ── 탭 전환 ───────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('btn-' + tab).classList.add('active');
  if (tab === 'generate') updateSummary();
}

// ── 뱃지/목걸이 선택 ──────────────────────────────────────────────────────
function setBadgeType(type) {
  state.badgeType = type;
  document.getElementById('badge-settings').style.display = type === 'badge' ? 'block' : 'none';
  document.getElementById('lanyard-settings').style.display = type === 'lanyard' ? 'block' : 'none';
  document.getElementById('type-badge').classList.toggle('active', type === 'badge');
  document.getElementById('type-lanyard').classList.toggle('active', type === 'lanyard');
  state.design = null;
  document.getElementById('lanyard-color-section').style.display = 'none';
  renderDesignCards();
}

// ── 옵션 토글 ─────────────────────────────────────────────────────────────
function setOpt(key, val, btn) {
  state[key] = val;
  btn.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── 색상 스와치 ───────────────────────────────────────────────────────────
function setColor(color, el) {
  state.color = color;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('color-name').textContent = color;
}

// ── 랜야드 규격 선택 (배치 토글 show/hide) ───────────────────────────────
function setLanyardSize(size, btn) {
  setOpt('lanyardSize', size, btn);
  const layoutGroup = document.getElementById('lanyard-layout-group');
  if (size === '대형 103×133mm') {
    layoutGroup.style.display = 'none';
    state.lanyardLayout = 'A4에 2개';
  } else {
    layoutGroup.style.display = '';
  }
}

// ── 행사모드 ──────────────────────────────────────────────────────────────
function toggleEventMode(checked) {
  state.eventMode = checked;
  document.getElementById('event-fields').style.display = checked ? 'block' : 'none';
}

// ── 디자인 카드 렌더링 ────────────────────────────────────────────────────
function renderDesignCards() {
  const container = document.getElementById('design-cards');
  const designs = state.badgeType === 'badge' ? BADGE_DESIGNS : LANYARD_DESIGNS;
  container.innerHTML = '';
  Object.entries(designs).forEach(([key, d]) => {
    const active = state.design === key;
    const div = document.createElement('div');
    div.className = 'design-card' + (active ? ' active' : '');
    div.innerHTML = `
      <div class="design-preview" style="background:${d.bg};font-size:24px">${d.icon}</div>
      <div style="margin-bottom:5px">
        <span class="design-card-id">${key}</span>
        <span class="design-card-name">${d.name}</span>
      </div>
      <div class="design-card-desc">${d.desc}</div>
      ${active ? '<div style="margin-top:6px;font-size:11px;font-weight:600;color:#0891B2">✓ 선택됨</div>' : ''}
    `;
    div.onclick = () => selectDesign(key);
    container.appendChild(div);
  });
}

function selectDesign(key) {
  state.design = key;
  if (state.badgeType === 'badge') {
    state.color = 'Gold';
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    document.querySelector('.swatch[title="Gold"]')?.classList.add('active');
    document.getElementById('color-name').textContent = 'Gold';
  } else {
    updateLanyardColors(key);
  }
  renderDesignCards();
}

function updateLanyardColors(designKey) {
  const opts = LANYARD_COLORS[designKey] || [];
  const sel = document.getElementById('lanyard-color-select');
  sel.innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
  state.color = opts[0] || '';
  sel.onchange = () => { state.color = sel.value; };
  document.getElementById('lanyard-color-section').style.display = 'block';
}

// ── 요약 업데이트 ─────────────────────────────────────────────────────────
function updateSummary() {
  const designs = { ...BADGE_DESIGNS, ...LANYARD_DESIGNS };
  document.getElementById('summary-count').textContent =
    state.peopleCount ? `${state.peopleCount}명` : '미업로드';
  document.getElementById('summary-design').textContent =
    state.design ? `${state.design} - ${designs[state.design]?.name}` : '미선택';
  document.getElementById('summary-color').textContent = state.color || '-';
}

// ── 엑셀 업로드 ───────────────────────────────────────────────────────────
async function handleExcelUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/upload-excel', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    state.excelPath = data.tmp_path;
    state.peopleCount = data.count;
    const zone = document.getElementById('excel-zone');
    zone.classList.add('success');
    zone.querySelector('.zone-title').textContent = `${file.name} (${data.count}명)`;
    renderPreview(data.people.slice(0, 5), data.count);
    showToast(`✅ ${data.count}명 로드 완료`, 'success');
    input.value = '';
  } catch(e) { showToast('업로드 실패', 'error'); }
}

function renderPreview(people, total) {
  document.getElementById('excel-preview').innerHTML = `
    <table class="preview-table">
      <thead><tr><th>이름</th><th>부서</th><th>직급</th></tr></thead>
      <tbody>${people.map(p =>
        `<tr><td>${p.name_kr||''}</td><td>${p.dept||''}</td><td>${p.rank||''}</td></tr>`
      ).join('')}</tbody>
    </table>
    ${total > 5 ? `<div style="font-size:11px;color:#9CA3AF;margin-top:6px">외 ${total-5}명 더</div>` : ''}
  `;
}

// ── 로고 업로드 ───────────────────────────────────────────────────────────
async function handleLogoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/upload-logo', { method: 'POST', body: fd });
    const data = await res.json();
    state.logoPath = data.tmp_path;
    document.getElementById('logo-preview').innerHTML = `
      <div class="logo-preview">
        <img src="data:image/png;base64,${data.b64}" alt="logo">
        <span class="logo-preview-name">${file.name}</span>
        <button class="logo-remove-btn" onclick="removeLogo()">
          <i data-lucide="x" style="width:16px;height:16px"></i>
        </button>
      </div>
    `;
    document.getElementById('logo-zone').classList.add('success');
    document.getElementById('company-name').disabled = true;
    lucide.createIcons();
    showToast('로고 업로드 완료', 'success');
    input.value = '';
  } catch(e) { showToast('로고 업로드 실패', 'error'); }
}

function removeLogo() {
  state.logoPath = null;
  document.getElementById('logo-preview').innerHTML = '';
  document.getElementById('logo-zone').classList.remove('success');
  document.querySelector('#logo-zone .zone-title').textContent = '클릭하거나 파일을 드래그하세요';
  document.getElementById('logo-input').value = '';
  document.getElementById('company-name').disabled = false;
}

// ── 드래그앤드롭 ──────────────────────────────────────────────────────────
['excel-zone', 'logo-zone'].forEach(id => {
  const zone = document.getElementById(id);
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (!files.length) return;
    const fakeInput = { files };
    if (id === 'excel-zone') handleExcelUpload(fakeInput);
    else                     handleLogoUpload(fakeInput);
  });
});

// ── 생성 ──────────────────────────────────────────────────────────────────
async function generate() {
  if (!state.excelPath)                                { showToast('엑셀 파일을 업로드해주세요', 'warning'); switchTab('upload');  return; }
  if (!state.logoPath && !state.companyName.trim())    { showToast('로고 또는 회사명을 입력해주세요', 'warning'); switchTab('upload'); return; }
  if (!state.design)                                   { showToast('디자인을 선택해주세요', 'warning'); switchTab('design');  return; }

  const btn     = document.getElementById('generate-btn');
  const spinner = document.getElementById('generate-spinner');
  const btnText = document.getElementById('generate-btn-text');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = '생성 중...';

  const fd = new FormData();
  fd.append('excel_path',   state.excelPath);
  fd.append('logo_path',    state.logoPath || '');
  fd.append('company_name', state.companyName);
  fd.append('badge_type',   state.badgeType);
  fd.append('design',       state.design);
  fd.append('color',        state.color);
  fd.append('size',         state.badgeType === 'badge' ? state.badgeSize   : state.lanyardSize);
  fd.append('layout',       state.badgeType === 'badge' ? state.badgeLayout : state.lanyardLayout);
  fd.append('event_mode',   String(state.eventMode));
  fd.append('event_name',   state.eventName);
  fd.append('event_date',   state.eventDate);

  try {
    const res  = await fetch('/generate', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { showToast('오류: ' + data.error, 'error'); return; }
    state.pptxFilename = data.filename;
    document.getElementById('download-title-text').textContent = `명찰 ${data.count}개 생성 완료!`;
    document.getElementById('download-card').classList.add('show');
    updateSummary();
    showToast(`✅ 명찰 ${data.count}개 생성 완료!`, 'success');
  } catch(e) {
    showToast('생성 실패: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = '명찰 생성하기';
  }
}

// ── 다운로드 ──────────────────────────────────────────────────────────────
function download() {
  if (state.pptxFilename) window.location = '/download/' + state.pptxFilename;
}

// ── 토스트 ────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── 초기화 ────────────────────────────────────────────────────────────────
renderDesignCards();
lucide.createIcons();
</script>
</body>
</html>
